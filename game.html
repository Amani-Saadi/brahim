<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;

  overflow-x: hidden;
  overflow-y: auto;

  min-height: 100vh;
  padding-bottom: 100px;

  background: linear-gradient(135deg, #0a0a0a, #1a0010, #2a0018);
  color: white;
}

/* Floating background hearts */
.background-heart {
  position: fixed;
  font-size: 18px;
  color: rgba(255, 77, 141, 0.4);
  animation: floatBg 6s linear infinite;
}

@keyframes floatBg {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* Title */
h1 {
  margin-top: 40px;
  font-size: 38px;
  color: #ff4d8d;
  text-shadow: 0 0 15px #ff4d8d;
}

p {
  color: #ffd1e6;
}

/* Game grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 85px);
  gap: 18px;
  justify-content: center;
  margin-top: 50px;
}

/* Cards */
.card {
  width: 85px;
  height: 85px;
  border-radius: 18px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 32px;
  cursor: pointer;

  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255, 255, 255, 0.1);

  transition: 0.3s;
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(255, 77, 141, 0.5);
}

.card.flipped {
  background: #ff4d8d;
  box-shadow: 0 0 25px #ff4d8d;
}

/* Message */
#message {
  margin-top: 40px;
  font-size: 22px;
  color: #ff4d8d;
  display: none;
  text-shadow: 0 0 10px #ff4d8d;
}

/* Image container (CENTERED) */
#imageContainer {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 30px;
}

/* Image */
#loveImage {
  width: 260px;
  border-radius: 20px;
  display: none;
  box-shadow: 0 0 30px rgba(255, 77, 141, 0.6);
}

.show {
  display: block !important;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* Hearts */
.heart {
  position: fixed;
  font-size: 26px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-500px) scale(2); opacity: 0; }
}
</style>
</head>

<body>

<h1>Find My Love 💖</h1>
<p>Match the hearts 😏</p>

<div class="grid" id="grid"></div>

<div id="message">
  You found all my love 💕<br>
  Happy Birthday  Huubi ❤️
</div>

<!-- Centered image -->
<div id="imageContainer">
  <img id="loveImage" src="us.jpg" alt="Love">
</div>

<script>

/* Floating background hearts */
function createBgHearts() {
  for (let i = 0; i < 20; i++) {
    const h = document.createElement("div");
    h.classList.add("background-heart");
    h.textContent = "❤";
    h.style.left = Math.random() * window.innerWidth + "px";
    h.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 7000);
  }
}
setInterval(createBgHearts, 1000);

/* Game logic */
const emojis = ["❤️","💖","💕","❤️","💖","💕"];
let first = null;
let second = null;
let lock = false;

const grid = document.getElementById("grid");

emojis.sort(() => 0.5 - Math.random());

emojis.forEach(symbol => {
  const card = document.createElement("div");
  card.classList.add("card");
  card.dataset.symbol = symbol;

  card.onclick = () => {
    if (lock || card.classList.contains("flipped")) return;

    card.textContent = symbol;
    card.classList.add("flipped");

    if (!first) {
      first = card;
    } else {
      second = card;
      lock = true;

      if (first.dataset.symbol === second.dataset.symbol) {
        first = null;
        second = null;
        lock = false;
        checkWin();
      } else {
        setTimeout(() => {
          first.textContent = "";
          second.textContent = "";
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          first = null;
          second = null;
          lock = false;
        }, 800);
      }
    }
  };

  grid.appendChild(card);
});

/* Win check */
function checkWin() {
  const all = document.querySelectorAll(".flipped");
  if (all.length === emojis.length) {
    document.getElementById("message").style.display = "block";

    // show image centered
    document.getElementById("loveImage").classList.add("show");

    launchHearts();
  }
}

/* Celebration hearts */
function launchHearts() {
  for (let i = 0; i < 60; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.textContent = "💖";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (1 + Math.random() * 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 2500);
  }
}

</script>

</body>
</html>
